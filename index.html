<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Web Rádio & Auto-DJ</title>
    <!-- Tailwind CSS para um design moderno e rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6 font-sans">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- CABEÇALHO -->
        <header class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-bold tracking-wider text-emerald-450 uppercase">PLAYLIST DIGITAL // AUTO-DJ</h1>
            <span class="bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1 rounded-full font-mono animate-pulse">● LIVE CONTROL</span>
        </header>

        <!-- SEÇÃO 1: DOIS PLAYERS DO YOUTUBE (LADO A LADO) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- PLAYER DECK A -->
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wide">PLAYER DECK A</h2>
                    <span id="status-a" class="text-xs text-red-400 font-mono">Vazio</span>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="url-a" placeholder="Cole o link do YouTube aqui..." class="w-full bg-slate-950 border border-slate-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-emerald-500 text-slate-300">
                    <button onclick="carregarPlayer('A')" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded text-sm font-medium transition">Carregar</button>
                </div>
                <!-- Container do Iframe do YouTube -->
                <div class="aspect-video bg-black rounded border border-slate-950 flex items-center justify-center text-slate-600 font-mono text-xs">
                    <div id="iframe-container-a" class="w-full h-full hidden"></div>
                    <span id="placeholder-a">Aguardando mídia...</span>
                </div>
            </div>

            <!-- PLAYER DECK B -->
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wide">PLAYER DECK B</h2>
                    <span id="status-b" class="text-xs text-red-400 font-mono">Vazio</span>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="url-b" placeholder="Cole o link do YouTube aqui..." class="w-full bg-slate-950 border border-slate-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-emerald-500 text-slate-300">
                    <button onclick="carregarPlayer('B')" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded text-sm font-medium transition">Carregar</button>
                </div>
                <!-- Container do Iframe do YouTube -->
                <div class="aspect-video bg-black rounded border border-slate-950 flex items-center justify-center text-slate-600 font-mono text-xs">
                    <div id="iframe-container-b" class="w-full h-full hidden"></div>
                    <span id="placeholder-b">Aguardando mídia...</span>
                </div>
            </div>
        </div>

        <!-- SEÇÃO 2: STREAM DECK DE VINHETAS -->
        <div class="bg-slate-800/60 p-6 rounded-xl border border-slate-700/60 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-lg font-bold tracking-wide">STREAM DECK (VINHETAS & TRILHAS)</h2>
                    <p class="text-xs text-slate-400">Dê um nome, selecione o arquivo de áudio e clique para disparar instantaneamente.</p>
                </div>
            </div>

            <!-- Grade de Botões do Stream Deck (Configurado para 8 botões expansíveis) -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                
                <!-- LOOP PARA GERAR OS BOTÕES (Exemplo de estrutura de 1 botão) -->
                <!-- Repita este bloco mudando o ID para criar mais botões -->
                <div class="bg-slate-950 border border-slate-700 p-3 rounded-lg flex flex-col justify-between h-28 hover:border-emerald-500/50 transition group">
                    <input type="text" placeholder="Nome da Vinheta" class="bg-transparent text-center font-bold text-xs text-emerald-400 placeholder-slate-600 focus:outline-none uppercase tracking-wider mb-1">
                    <input type="file" id="vinheta-1-file" accept="audio/*" class="hidden" onchange="atualizarBotao(1)">
                    <label for="vinheta-1-file" id="label-1" class="text-[10px] text-center text-slate-500 cursor-pointer hover:text-slate-300 truncate px-1">📁 Carregar Áudio</label>
                    <button id="btn-play-1" onclick="tocarVinheta(1)" disabled class="mt-2 w-full bg-slate-800 group-hover:bg-slate-700 text-slate-400 font-bold text-xs py-2 rounded uppercase tracking-widest transition cursor-not-allowed">
                        DISPARAR
                    </button>
                </div>

                <!-- Botão 2 -->
                <div class="bg-slate-950 border border-slate-700 p-3 rounded-lg flex flex-col justify-between h-28 hover:border-emerald-500/50 transition group">
                    <input type="text" placeholder="Nome da Vinheta" class="bg-transparent text-center font-bold text-xs text-emerald-400 placeholder-slate-600 focus:outline-none uppercase tracking-wider mb-1">
                    <input type="file" id="vinheta-2-file" accept="audio/*" class="hidden" onchange="atualizarBotao(2)">
                    <label for="vinheta-2-file" id="label-2" class="text-[10px] text-center text-slate-500 cursor-pointer hover:text-slate-300 truncate px-1">📁 Carregar Áudio</label>
                    <button id="btn-play-2" onclick="tocarVinheta(2)" disabled class="mt-2 w-full bg-slate-800 group-hover:bg-slate-700 text-slate-400 font-bold text-xs py-2 rounded uppercase tracking-widest transition cursor-not-allowed">
                        DISPARAR
                    </button>
                </div>

                <!-- Botão 3 -->
                <div class="bg-slate-950 border border-slate-700 p-3 rounded-lg flex flex-col justify-between h-28 hover:border-emerald-500/50 transition group">
                    <input type="text" placeholder="Nome da Vinheta" class="bg-transparent text-center font-bold text-xs text-emerald-400 placeholder-slate-600 focus:outline-none uppercase tracking-wider mb-1">
                    <input type="file" id="vinheta-3-file" accept="audio/*" class="hidden" onchange="atualizarBotao(3)">
                    <label for="vinheta-3-file" id="label-3" class="text-[10px] text-center text-slate-500 cursor-pointer hover:text-slate-300 truncate px-1">📁 Carregar Áudio</label>
                    <button id="btn-play-3" onclick="tocarVinheta(3)" disabled class="mt-2 w-full bg-slate-800 group-hover:bg-slate-700 text-slate-400 font-bold text-xs py-2 rounded uppercase tracking-widest transition cursor-not-allowed">
                        DISPARAR
                    </button>
                </div>

                <!-- Botão 4 -->
                <div class="bg-slate-950 border border-slate-700 p-3 rounded-lg flex flex-col justify-between h-28 hover:border-emerald-500/50 transition group">
                    <input type="text" placeholder="Nome da Vinheta" class="bg-transparent text-center font-bold text-xs text-emerald-400 placeholder-slate-600 focus:outline-none uppercase tracking-wider mb-1">
                    <input type="file" id="vinheta-4-file" accept="audio/*" class="hidden" onchange="atualizarBotao(4)">
                    <label for="vinheta-4-file" id="label-4" class="text-[10px] text-center text-slate-500 cursor-pointer hover:text-slate-300 truncate px-1">📁 Carregar Áudio</label>
                    <button id="btn-play-4" onclick="tocarVinheta(4)" disabled class="mt-2 w-full bg-slate-800 group-hover:bg-slate-700 text-slate-400 font-bold text-xs py-2 rounded uppercase tracking-widest transition cursor-not-allowed">
                        DISPARAR
                    </button>
                </div>

            </div>
        </div>

    </div>

    <!-- LÓGICA EM JAVASCRIPT -->
    <script>
        // Função para extrair a ID do vídeo do YouTube a partir de qualquer URL padrão
        function extrairIdYoutube(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Carrega o player correspondente inserindo o iframe de incorporação do YT
        function carregarPlayer(deck) {
            const inputUrl = document.getElementById(`url-${deck.toLowerCase()}`).value;
            const videoId = extrairIdYoutube(inputUrl);
            const container = document.getElementById(`iframe-container-${deck.toLowerCase()}`);
            const placeholder = document.getElementById(`placeholder-${deck.toLowerCase()}`);
            const status = document.getElementById(`status-${deck.toLowerCase()}`);

            if (videoId) {
                // Monta o iframe com autoplay ativado para agilizar a transição
                container.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                container.classList.remove('hidden');
                placeholder.classList.add('hidden');
                status.textContent = "Pronto / Tocando";
                status.className = "text-xs text-emerald-400 font-mono";
            } else {
                alert("Por favor, insira um link válido do YouTube.");
            }
        }

        // Banco de áudios na memória para o Stream Deck
        const bancoDeAudioVinhetas = {};

        // Ativa o botão do Stream Deck assim que o usuário faz o upload do arquivo de áudio
        function atualizarBotao(id) {
            const fileInput = document.getElementById(`vinheta-${id}-file`);
            const label = document.getElementById(`label-${id}`);
            const btnPlay = document.getElementById(`btn-play-${id}`);
            
            if (fileInput.files && fileInput.files[0]) {
                const arquivo = fileInput.files[0];
                label.textContent = `✔ ${arquivo.name}`;
                label.className = "text-[10px] text-center text-emerald-500 truncate font-medium px-1";
                
                // Cria um objeto de áudio HTML5 a partir do arquivo local
                bancoDeAudioVinhetas[id] = new Audio(URL.createObjectURL(arquivo));
                
                // Habilita o botão de disparo
                btnPlay.disabled = false;
                btnPlay.className = "mt-2 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-2 rounded uppercase tracking-widest transition cursor-pointer shadow-md shadow-emerald-900/20";
            }
        }

        // Toca a vinheta por cima da programação sem cortar o YouTube
        function tocarVinheta(id) {
            if (bancoDeAudioVinhetas[id]) {
                // Reseta a vinheta para o início caso ela já esteja tocando e o usuário clique de novo
                bancoDeAudioVinhetas[id].currentTime = 0;
                bancoDeAudioVinhetas[id].play();
            }
        }
    </script>
</body>
</html>
