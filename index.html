<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Web Rádio & Auto-DJ Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6 font-sans">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-bold tracking-wider text-emerald-400 uppercase">PLAYLIST DIGITAL // AUTO-DJ PRO</h1>
            <span class="bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1 rounded-full font-mono animate-pulse">● STUDIO LIVE</span>
        </header>

        <div class="bg-slate-800/80 p-4 rounded-xl border border-sky-700/50 shadow-xl">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xs font-bold text-sky-400 uppercase tracking-wide">MÚSICA DE FUNDO (TRILHA / BG MUSIC)</h2>
                <span id="status-bg" class="text-xs text-slate-500 font-mono">Desconectado</span>
            </div>
            <div class="flex gap-2">
                <input type="text" id="url-bg" placeholder="Cole o link do YouTube para a trilha de fundo..." class="w-full bg-slate-950 border border-slate-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-sky-500 text-slate-300">
                <button onclick="carregarPlayerBG()" class="bg-sky-600 hover:bg-sky-500 px-5 py-1.5 rounded text-sm font-medium transition whitespace-nowrap">Soltar Fundo</button>
            </div>
            <div class="mt-3 aspect-[32/9] bg-black rounded border border-slate-950 hidden" id="wrapper-bg">
                <div id="iframe-container-bg" class="w-full h-full"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wide">PLAYER DECK A</h2>
                    <span id="status-a" class="text-xs text-red-400 font-mono">Vazio</span>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="url-a" placeholder="Cole o link do YouTube aqui..." class="w-full bg-slate-950 border border-slate-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-emerald-500 text-slate-300">
                    <button onclick="carregarPlayer('A')" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded text-sm font-medium transition">Carregar</button>
                </div>
                <div class="aspect-video bg-black rounded border border-slate-950 flex items-center justify-center text-slate-600 font-mono text-xs">
                    <div id="iframe-container-a" class="w-full h-full hidden"></div>
                    <span id="placeholder-a">Aguardando mídia...</span>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wide">PLAYER DECK B</h2>
                    <span id="status-b" class="text-xs text-red-400 font-mono">Vazio</span>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="url-b" placeholder="Cole o link do YouTube aqui..." class="w-full bg-slate-950 border border-slate-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-emerald-500 text-slate-300">
                    <button onclick="carregarPlayer('B')" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded text-sm font-medium transition">Carregar</button>
                </div>
                <div class="aspect-video bg-black rounded border border-slate-950 flex items-center justify-center text-slate-600 font-mono text-xs">
                    <div id="iframe-container-b" class="w-full h-full hidden"></div>
                    <span id="placeholder-b">Aguardando mídia...</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/60 p-6 rounded-xl border border-slate-700/60 shadow-xl">
            <div class="mb-4">
                <h2 class="text-lg font-bold tracking-wide">STREAM DECK (REALTIME DATABASE)</h2>
                <p class="text-xs text-slate-400">Escreva o nome e carregue o áudio. Sincronização automática em nuvem.</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <script>
                    for (let i = 1; i <= 8; i++) {
                        document.write(`
                        <div class="bg-slate-950 border border-slate-700 p-3 rounded-lg flex flex-col justify-between min-h-[145px] relative group">
                            
                            <input type="text" id="name-${i}" placeholder="Vinheta ${i}" onblur="salvarApenasNome(${i})" class="bg-transparent text-center font-bold text-xs text-emerald-400 placeholder-slate-600 focus:outline-none uppercase tracking-wider mb-1 w-full border-b border-transparent focus:border-slate-800">
                            
                            <input type="file" id="vinheta-${i}-file" accept="audio/*" class="hidden" onchange="atualizarBotao(${i})">
                            
                            <div class="text-center my-1 text-slate-500">
                                <label for="vinheta-${i}-file" id="label-${i}" class="text-[10px] block cursor-pointer hover:text-emerald-400 transition truncate px-1">
                                    📁 Carregar Áudio
                                </label>
                                <button id="btn-edit-${i}" onclick="document.getElementById('vinheta-${i}-file').click()" class="hidden text-[9px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-0.5 rounded mx-auto mt-1 uppercase font-mono tracking-tighter">
                                    🔄 Substituir
                                </button>
                            </div>

                            <div class="grid grid-cols-3 gap-1 mt-2">
                                <button id="btn-play-${i}" onclick="tocarVinheta(${i})" disabled class="col-span-2 bg-slate-800 text-slate-500 font-bold text-xs py-2 rounded uppercase tracking-wider transition cursor-not-allowed">
                                    PLAY
                                </button>
                                <button id="btn-stop-${i}" onclick="pararVinheta(${i})" disabled class="bg-slate-800 text-slate-500 font-bold text-xs py-2 rounded transition cursor-not-allowed flex items-center justify-center">
                                    ■
                                </button>
                            </div>
                        </div>
                        `);
                    }
                </script>
            </div>
        </div>

    </div>

    <script>
        // Configuração estruturada para usar a sua URL do Realtime Database
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI", // <-- Pegue a API Key nas configurações do seu projeto Firebase
            authDomain: "expedicao-sergio.firebaseapp.com",
            databaseURL: "https://expedicao-sergio-default-rtdb.firebaseio.com",
            projectId: "expedicao-sergio",
            storageBucket: "expedicao-sergio.appspot.com", // <-- Nome padrão do Storage do seu projeto
            messagingSenderId: "SUA_SENDER_ID_AQUI",
            appId: "SUA_APP_ID_AQUI"
        };

        // Inicializa o ecossistema Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();

        const bancoDeAudioVinhetas = {};

        // Busca automática ao carregar a página de qualquer PC usando Realtime Database
        window.onload = function() {
            console.log("Conectando ao Realtime Database...");
            
            database.ref('stream_deck').once('value', (snapshot) => {
                const dadosGerais = snapshot.val();
                if (dadosGerais) {
                    Object.keys(dadosGerais).forEach(key => {
                        const dados = dadosGerais[key];
                        const id = dados.id_botao;
                        
                        if (dados.nome) {
                            document.getElementById(`name-${id}`).value = dados.nome;
                        }
                        if (dados.audio_url) {
                            configurarBotaoPronto(id, dados.audio_url, "Nuvem");
                        }
                    });
                }
            }).catch(error => console.error("Erro ao ler banco de dados:", error));
        };

        function extrairIdYoutube(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function carregarPlayer(deck) {
            const inputUrl = document.getElementById(`url-${deck.toLowerCase()}`).value;
            const videoId = extrairIdYoutube(inputUrl);
            const container = document.getElementById(`iframe-container-${deck.toLowerCase()}`);
            const placeholder = document.getElementById(`placeholder-${deck.toLowerCase()}`);
            const status = document.getElementById(`status-${deck.toLowerCase()}`);

            if (videoId) {
                container.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                container.classList.remove('hidden');
                placeholder.classList.add('hidden');
                status.textContent = "Tocando";
                status.className = "text-xs text-emerald-400 font-mono";
            } else {
                alert("Insira uma URL válida do YouTube.");
            }
        }

        function carregarPlayerBG() {
            const inputUrl = document.getElementById('url-bg').value;
            const videoId = extrairIdYoutube(inputUrl);
            const wrapper = document.getElementById('wrapper-bg');
            const container = document.getElementById('iframe-container-bg');
            const status = document.getElementById('status-bg');

            if (videoId) {
                container.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>`;
                wrapper.classList.remove('hidden');
                status.textContent = "Trilha Ativa";
                status.className = "text-xs text-sky-400 font-mono";
            } else {
                alert("Insira uma URL válida para a música de fundo.");
            }
        }

        // Salva modificações do campo de nome instantaneamente no Realtime Database
        function salvarApenasNome(id) {
            const nomeVinheta = document.getElementById(`name-${id}`).value;
            database.ref(`stream_deck/botao_${id}`).update({
                id_botao: id,
                nome: nomeVinheta
            });
        }

        // Upload do arquivo pro Storage + Salvamento do Link no Realtime Database
        async function atualizarBotao(id) {
            const fileInput = document.getElementById(`vinheta-${id}-file`);
            const nomeVinheta = document.getElementById(`name-${id}`).value || `Vinheta ${id}`;
            const label = document.getElementById(`label-${id}`);
            
            if (fileInput.files && fileInput.files[0]) {
                const arquivo = fileInput.files[0];
                
                label.textContent = "⏳ Sincronizando Nuvem...";
                label.className = "text-[10px] text-yellow-500 animate-pulse block text-center";

                try {
                    // 1. Envia o áudio para o Firebase Storage
                    const storageRef = storage.ref(`vinhetas/botao_${id}_${arquivo.name}`);
                    const uploadTask = await storageRef.put(arquivo);
                    
                    // 2. Captura a URL pública do áudio
                    const urlAudioNuvem = await uploadTask.ref.getDownloadURL();
                    
                    // 3. Atualiza os dados de forma ordenada no Realtime Database
                    await database.ref(`stream_deck/botao_${id}`).set({
                        id_botao: id,
                        nome: nomeVinheta,
                        audio_url: urlAudioNuvem
                    });

                    configurarBotaoPronto(id, urlAudioNuvem, arquivo.name);

                } catch (erro) {
                    console.error("Falha ao salvar dados no Firebase:", erro);
                    label.textContent = "❌ Erro ao salvar";
                    label.className = "text-[10px] text-red-500 block text-center";
                }
            }
        }

        function configurarBotaoPronto(id, urlAudio, nomeExibicao) {
            const label = document.getElementById(`label-${id}`);
            const btnPlay = document.getElementById(`btn-play-${id}`);
            const btnStop = document.getElementById(`btn-stop-${id}`);
            const btnEdit = document.getElementById(`btn-edit-${id}`);

            if(bancoDeAudioVinhetas[id]) {
                bancoDeAudioVinhetas[id].pause();
            }

            bancoDeAudioVinhetas[id] = new Audio(urlAudio);
            
            label.textContent = `🔊 ${nomeExibicao}`;
            label.className = "text-[10px] block text-emerald-500 truncate font-medium px-1";
            
            btnEdit.classList.remove('hidden');
            
            btnPlay.disabled = false;
            btnPlay.className = "col-span-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-2 rounded uppercase tracking-wider transition cursor-pointer";
            
            btnStop.disabled = false;
            btnStop.className = "bg-red-600 hover:bg-red-500 text-white font-bold text-xs py-2 rounded transition cursor-pointer flex items-center justify-center";
        }

        function tocarVinheta(id) {
            if (bancoDeAudioVinhetas[id]) {
                bancoDeAudioVinhetas[id].currentTime = 0;
                bancoDeAudioVinhetas[id].play();
            }
        }

        function pararVinheta(id) {
            if (bancoDeAudioVinhetas[id]) {
                bancoDeAudioVinhetas[id].pause();
                bancoDeAudioVinhetas[id].currentTime = 0;
            }
        }
    </script>
</body>
</html>
